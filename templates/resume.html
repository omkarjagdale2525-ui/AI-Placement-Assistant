<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">
    <h1 class="text-center mb-4">📄 AI Resume Generator</h1>

    <div class="card shadow p-4">
        <form action="/generate_resume" method="POST">

            <input name="name" class="form-control mb-3" placeholder="Full Name" required>

            <input name="email" type="email" class="form-control mb-3" placeholder="Email" required>

            <input name="phone" class="form-control mb-3" placeholder="Phone Number" required>

            <input name="linkedin" class="form-control mb-3" placeholder="LinkedIn Profile">

            <textarea name="education" class="form-control mb-3" rows="3" placeholder="Education Details" required></textarea>

            <textarea name="skills" class="form-control mb-3" rows="3" placeholder="Technical Skills" required></textarea>

            <textarea name="projects" class="form-control mb-3" rows="4" placeholder="Projects" required></textarea>

            <textarea name="certifications" class="form-control mb-3" rows="3" placeholder="Certifications"></textarea>

            <button type="submit" class="btn btn-primary">
                Generate Resume
            </button>

            <a href="/" class="btn btn-secondary">Back</a>

        </form>
    </div>
</div>

</body>
</html>
