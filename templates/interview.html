<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interview Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">

    <h1 class="text-center mb-4">🎤 Interview Question Generator</h1>

    <div class="card shadow p-4">

        <form method="POST" action="/interview">

            <label class="form-label">Select Subject</label>
            <select name="subject" class="form-control mb-3">
    <option value="python">Python</option>
    <option value="sql">SQL</option>
    <option value="dbms">DBMS</option>
    <option value="os">Operating Systems</option>
    <option value="cn">Computer Networks</option>
    <option value="web">HTML/CSS/JavaScript</option>
    <option value="php">PHP</option>
    <option value="linux">Linux</option>
    <option value="data analytics">Data Analytics</option>
    <option value="hr">HR Interview</option>
</select>

            <label class="form-label">Select Difficulty</label>
            <select name="difficulty" class="form-control mb-3">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>

            <button type="submit" class="btn btn-primary">
                Generate Questions
            </button>

            <a href="/" class="btn btn-secondary">
                Back
            </a>

        </form>

    </div>

    {% if questions %}

    <div class="card shadow p-4 mt-4">

        <h3 class="mb-3">
            Generated {{ difficulty.title() }} {{ subject.upper() }} Interview Questions
        </h3>

        {% for question, answer in questions %}

        <div class="mb-4">
            <h5>Q{{ loop.index }}. {{ question }}</h5>
            <p><strong>Answer:</strong> {{ answer }}</p>
        </div>

        {% endfor %}

    </div>

    {% endif %}

</div>

</body>
</html>
